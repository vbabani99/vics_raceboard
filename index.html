/*
      Smart Scoreboard v3 - CSS limpio y documentado
      - Este bloque se consolidó: se eliminaron duplicados y se preservó el resultado final.
      - La cascada se mantiene: para cada selector se fusionaron propiedades, la última gana.
      - Encoding: UTF-8
    */
:root{
  --w: 364px;
  --pad: 12px;
  --rowH: 64px;
  --sep: rgba(255,255,255,0.10);
  --bg1: #06080c;
  --bg2: #0b0f17;
  --gold: #f5c542;
  --silver: #cfd6df;
  --bronze: #c98b45;
  --yellow: #ffd24a;
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.66);
  --accent: var(--yellow);
  --accentRgb: 255,210,74;
  --cGreen: #35ff7a;
  --cGreenDim: #0f8a3e;
  --cRed: #ff4d4d;
  --cPurple: #b16cff;
  --cCyan: #2dfcff;
  --cBlue: #2b7bff;
  --cBlueRgb: 43,123,255;
  --cRight: var(--yellow);
  --cWhite: rgba(255,255,255,0.92);
  --cWhite2: rgba(255,255,255,0.66);

}
html,body{
  margin: 0;
  background: transparent;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  text-rendering: geometricPrecision;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
/* Contenedor compacto tipo letrero */ .card{
  width: var(--w);
  box-sizing: border-box;
  position: relative;
  padding: var(--pad);
  border-radius: 18px;
  background: radial-gradient(120% 80% at 50% 0%, rgba(255,190,0,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 18px 50px rgba(0,0,0,0.55);
}
/* Carbon vibe (sutil) */ .card:before{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.10;
}
.topbar{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.10);
}
.brand{
  display: flex;
  flex-direction: row;
  align-items: baseline;
  line-height: 1;
}
.brand .t1{
  font-weight: 900;
  letter-spacing: 0.08em;
  font-size: 13px;
  white-space: nowrap;
  text-transform: none;
}
.brand .t2{
  display: none !important;
  font-size: 10px;
  letter-spacing: 0.16em;
}
.tag{
  font-weight: 900;
  letter-spacing: 0.10em;
  font-size: 13px;
  color: var(--yellow);
  padding: 7px 10px;
  border-radius: 10px;
  background: rgba(var(--accentRgb),0.08);
  border: 1px solid rgba(var(--accentRgb),0.30);
  white-space: nowrap;
}
.title{
  margin-top: 10px;
  text-align: center;
  font-weight: 900;
  letter-spacing: 0.12em;
  font-size: 20px;
  padding: 10px 0 10px;
  border-bottom: 1px solid rgba(255,255,255,0.10);
}
.thead{
  display: grid;
  grid-template-columns: 52px minmax(0,1fr) 66px;
  gap: 3px;
  align-items: center;
  font-weight: 900;
  letter-spacing: 0.10em;
  font-size: 11px;
  padding: 9px 0;
  border-bottom: 2px solid rgba(var(--accentRgb),0.35);
  opacity: 0.95;
}
#rows{
  margin-top: 6px;
  padding-bottom: 18px;
}
.row{
  display: grid;
  grid-template-columns: 52px minmax(0,1fr) 66px;
  gap: 3px;
  align-items: center;
  height: var(--rowH);
  border-bottom: 1px solid var(--sep);
  position: relative;
}

/* v3.0.1.52 - spacing: first row clearance under header line */
.row:first-child{
  margin-top: 4px;
}

.row.leader{
  border-bottom: 1px solid rgba(var(--accentRgb),0.40);
}
.row.leader:before{
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 2px;
  background: rgba(var(--accentRgb),0.55);
}
/* Leader row: interval not used */
.row.leader .rightInt{ display:none !important; }
/* Finished pilot (hit race duration) */
.row.finished{
  background: rgba(255,77,77,0.12);
  box-shadow: inset 0 0 0 1px rgba(255,77,77,0.22);
}
.row.finished .pilotName{
  color: rgba(255,255,255,0.92);
}
.row.finished .posBox{
  box-shadow: 0 0 0 2px rgba(255,77,77,0.18);
}
/* Al terminar, ocultar el cronometro de la barra de progreso */
.row.finished .lapBarTime{
  position:absolute;
  top:50%;
  transform: translateY(calc(-50% + 20px));
  left:0px;
  font-size:10px;
  line-height:10px;
  font-weight:900;
  letter-spacing:0.02em;
  color: rgba(255,255,255,0.90);
  text-shadow: 0 1px 0 rgba(0,0,0,0.65);
  pointer-events:none;
  display:none;
}

.posBox{
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0px;
  width: 58px;
  height: 40px;
  border-radius: 10px;
  font-weight: 900;
  font-size: 18px;
  color: rgba(255,255,255,0.95);
  justify-self: start;
}
.p1{
  background: linear-gradient(180deg, #ffd86a, #caa23b);
}
.p2{
  background: linear-gradient(180deg, #e9eef4, #aeb8c4);
}
.p3{
  background: linear-gradient(180deg, #e0a163, #8a5326);
}
.pN{
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);

      100%{ box-shadow: 0 0 18px rgba(255,93,93,0.30), 0 0 0 1px rgba(255,93,93,0.14) inset; transform: scale(1); }
    }/* Arrow/Delta inside pos box - stacked (no overlap) */ .posBox{

    inset 0 0 0 1px rgba(177,108,255,0.38),
    0 0 22px rgba(177,108,255,0.18);
}
.row.bestNow:after{
  content:"";
  position:absolute;
  inset:-1px;
  pointer-events:none;
  background: linear-gradient(90deg,
    rgba(0,0,0,0) 0%,
    rgba(177,108,255,0.20) 40%,
    rgba(53,255,122,0.10) 55%,
    rgba(0,0,0,0) 100%);
  animation: bestSweep 700ms ease-out both;
}
@keyframes bestSweep{
  from{ transform: translateX(-70%); opacity: 0.0; }
  15%{ opacity: 1; }
  to{ transform: translateX(70%); opacity: 0.0; }
}
.row.bestNow .lapBarFill{
  background: linear-gradient(90deg, rgba(177,108,255,0.92), rgba(53,255,122,0.55));
}

/* Leader lap pulse (solo cuando suben vueltas del lider) */
.row.leader.leaderLapPulse .rightTop{
  animation: leaderLapPulse 520ms ease-out both;
}
@keyframes leaderLapPulse{
  0%{ transform: scale(1); text-shadow: 0 0 0 rgba(0,0,0,0); }
  30%{ transform: scale(1.08); text-shadow: 0 0 18px rgba(var(--accentRgb),0.35); }
  100%{ transform: scale(1); text-shadow: 0 0 10px rgba(var(--accentRgb),0.18); }
}

/* Move cues (sin mover, solo glow) */
.row.moveUp{
  box-shadow: inset 0 0 0 1px rgba(53,255,122,0.18), 0 0 14px rgba(53,255,122,0.10);
}
.row.moveDown{
  box-shadow: inset 0 0 0 1px rgba(255,93,93,0.16), 0 0 14px rgba(255,93,93,0.08);
}

/* Clock critical (ultimos 10s en countdown) */
.raceClock.critical{
  animation: clockCritical 900ms ease-in-out infinite;
}
@keyframes clockCritical{
  0%,100%{
    transform: scale(1);
    text-shadow: 0 0 12px rgba(255,255,255,0.10), 0 0 22px rgba(255,77,77,0.12);
  }
  50%{
    transform: scale(1.04);
    text-shadow: 0 0 16px rgba(255,255,255,0.14), 0 0 30px rgba(255,77,77,0.20);
  }
}
/* ===== v3.0.0.40: rightVal -3px (tamanio) ===== */ /* Limitar el ancho de los mini-stats para que no invadan el area de GAP/LAPS */ .nm1Stats,.nm2Stats{
  width: 11ch !important;
  max-width: 11ch !important;
  min-width: 0 !important;
  overflow: hidden;
}
/* Un pelin menos de espacio interno para regalar pixeles al nombre */ .nm1,.nm2{
  column-gap: 5px;
}
/* Asegurar que nada pinte fuera del bloque PILOTO */ .pilotName{
  overflow: hidden;
  width: auto;
  flex: 0 1 auto;
}
/* V3 header fixes: no overlap, single-line brand */
  .brand{line-height:1.0}/* Reserve space for animated top logo so it doesn't overlap topbar */ .logoTop{
  height: 128px;
  padding: 8px 0 8px;
  overflow: hidden;
}
@keyframes logoBreathe{0%{transform:translateZ(0) scale(1.0)}50%{transform:translateZ(0) scale(1.02)}100%{transform:translateZ(0) scale(1.0)}}/* ===== v3.0.0.38 - evitar que LAPS/Last/Est/Best se encimen con el bloque GAP ===== */ .mid{
  min-width: 0;
  overflow: hidden;
}
.nm1,.nm2{
  min-width: 0;
}
/* Stats 2x2: que puedan encogerse y nunca invadan la col derecha */ .nm1Stats,.nm2Stats{
  max-width: 100%;
  overflow: hidden;
  white-space: nowrap;
}
.nm1Stats .lapsMini,.nm2Stats .estMini{
  max-width: 4.5ch;
  overflow: hidden;
  text-overflow: clip;
}
/* Mantener alineacion y evitar que el padding provoque overflow visual */ .nm1First,.nm2Last{
  max-width: 100%;
}
/* ===== Row layout aligned (pos | name | stats | right) - v3.0.1.74 TV crisp ===== */ .row{
  display: grid;
  grid-template-columns: 62px minmax(0,1fr) 108px 73px;
  grid-template-rows: 1fr 8px;
  column-gap: 4px;
  row-gap: 4px;
  align-items: center;
  height: var(--rowH);
}
/* Primera hilera: 4 columnas */
.row > .posBox,
.row > .pilotName,
.row > .statsBlock,
.row > .right{ grid-row: 1; }
/* Segunda hilera: barra (desde PILOTO hasta DERECHA) */
.rowBar{
  grid-row: 2;
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  min-width: 0;
  padding: 0;
  margin: 0;
  position: relative;
  z-index: 2;
  padding: 0 6px;
}
.rowBar .lapBar{
  position: relative;
  left: auto !important;
  bottom: auto !important;
  width: 100%;
  flex: 1 1 auto;
  height: 6px;
  background: rgba(0,0,0,0.60);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 6px;
  overflow: visible;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.45);
}
.rowBar .lapBarFill{border-radius:6px;}

/* Keep posBox width stable */ .posBox{
  width: 62px;
}
/* Name column only text (stats moved out) */ .nm1,.nm2{
  display: block !important;
  grid-template-columns: none !important;
  column-gap: 0 !important;
}
/* Stats column (2 lines,right-aligned) */ .statsBlock{
  min-width: 0;
  width: 108px;
  margin-left: 0;
  height: 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  align-items: center;
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  line-height: 1;
  overflow: hidden;
  text-rendering: geometricPrecision;
}
.statsBlock .stTop,.statsBlock .stBot{
  display: grid;
  align-items: center;
  justify-items: center;
  width: 100%;
  white-space: nowrap;
  font-size: 12px;
  line-height: 12px;
  font-weight: 700;
}
.statsBlock .stTop{
  grid-template-columns: minmax(0,1fr);
  column-gap: 0;
}
.statsBlock .stBot{
  grid-template-columns: minmax(0,1fr);
  column-gap: 0;
}
.statsBlock .rotLabel{
  display: none !important;
  visibility: hidden !important;
}
.statsBlock .rotValue{
  visibility: hidden;
  text-align: center;
  justify-self: center;
  min-width: 0;
  overflow: hidden;
  text-overflow: clip;
  font-size: 12px !important;
  line-height: 12px !important;
  font-weight: 800 !important;
  letter-spacing: 0 !important;
  opacity: 1 !important;
  font-variant-numeric: tabular-nums;
  text-rendering: geometricPrecision;
}
.statsBlock .rotValue.modeBest{ color: var(--cPurple); }
.statsBlock .rotValue.modeEst{ color: var(--cCyan); }
.statsBlock .rotValue.modeMean{ color: var(--yellow); }
.statsBlock.rotBest .rotLabel{ color: rgba(217,180,255,0.86); }
.statsBlock.rotEst .rotLabel{ color: rgba(124,242,255,0.86); }
.statsBlock.rotMean .rotLabel{ color: rgba(255,212,74,0.90); }
.statsBlock.rotSwap .rotLabel,
.statsBlock.rotSwap .rotValue{
  animation: statsRotFade 160ms ease-out;
}
@keyframes statsRotFade{
  0%{ opacity: 0.28; }
  100%{ opacity: 1; }
}
.statsBlock .rotStore{
  display: none !important;
}
.statsBlock .lapsMiniTop,
.statsBlock .sepDash{
  display: none !important;
}
.statsBlock .llMiniTop{
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  justify-self: center;
  min-width: 0;
  overflow: visible;
  text-overflow: unset;
  color: rgba(255,255,255,0.96);
  font-size: 13px !important;
  line-height: 13px !important;
  font-weight: 800 !important;
}
.statsBlock .lapsMiniTop,.statsBlock .llMiniTop,.statsBlock .estMiniBot,.statsBlock .blMini,.statsBlock .lapsMini,.statsBlock .llMini,.statsBlock .estMini{
  font-size: 12px !important;
  line-height: 12px !important;
  font-weight: 700;
  letter-spacing: 0 !important;
  opacity: 1 !important;
  font-variant-numeric: tabular-nums;
  text-rendering: geometricPrecision;
}
/* Header align with row columns */ .thead{
  display: grid;
  grid-template-columns: 62px minmax(0,1fr) 108px 73px;
  gap: 4px;
}
.hdStats{
  text-align: center;
  opacity: 0.70;
  letter-spacing: 0.08em;
}


/* Lap progress bar (under last name) */
.lapBar{position:absolute;left:0;bottom:0;width:95px;height:3px;background:rgba(255,255,255,0.14);border-radius:3px;overflow:hidden;pointer-events:none}
.lapBarFill{height:100%;width:0%;background:hsl(120, 100%, 50%)}
.lapBar.overdue .lapBarFill{background:#ff2a2a}
.lapBarTime{
  position:absolute;
  top: 4px;
  left:0;
  transform:translateX(-50%);
  font-size:8.5px;
  line-height:1;
  letter-spacing:0.02em;
  color:rgba(255,255,255,0.92);
  text-shadow:0 1px 2px rgba(0,0,0,0.75);
  background: rgba(0,0,0,0.45);
  padding: 1px 3px;
  border-radius: 4px;
  pointer-events:none;
  z-index: 5;
  white-space:nowrap;
}
.lapBar.overdue .lapBarTime{ color:#ff2a2a; }

.lapGhost{position:absolute;top:0;left:0;width:3px;height:100%;background:rgba(255,255,255,0.70);box-shadow:0 0 10px rgba(255,255,255,0.55);opacity:0;pointer-events:none}
.lapGhostBest{
  position:absolute;
  top: -2px;
  left:0;
  width:3px;
  height: 10px;
  background: #b04cff;
  box-shadow: 0 0 10px rgba(176,76,255,0.65);
  opacity: 0.95;
  pointer-events:none;  z-index: 6;
  border-radius: 2px;

}
.lapGhost.show{ opacity:0.85; }

/* Theme button */
.themeBtn{
  margin-top: 0;
  padding: 4px 7px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: var(--text);
  font-weight: 900;
  letter-spacing: 0.10em;
  font-size: 9px;
  cursor: pointer;
  user-select: none;

  box-shadow: 0 0 14px rgba(var(--accentRgb),0.14);
  text-shadow: 0 0 10px rgba(var(--accentRgb),0.25), 0 1px 0 rgba(0,0,0,0.60);
}
.themeBtn.isAuto{ box-shadow: 0 0 18px rgba(var(--accentRgb),0.24); }




.themeBtn:hover{
  border-color: rgba(var(--accentRgb),0.55);
}
.themeBtn:active{
  transform: translateY(1px);
}

<script>
// ===== Lap progress bars (per piloto) =====
function updateLapBars(){
  const rowsEl = document.getElementById('rows');
  if(!rowsEl) return;
  const now = Date.now();
  const kids = rowsEl.children;
  for(let i=0;i<kids.length;i++){
    const row = kids[i];
    if(!row || !row._refs || !row._refs.lapBarFill) continue;
    const fill = row._refs.lapBarFill;
    // If pilot already finished (hit duration), keep bar frozen
    if(row.__finished){
      const tElF = row._refs.lapBarTime || null;
      fill.style.width = '0%';
      fill.style.background = '';
      const bF = fill.parentElement; if(bF) bF.classList.remove('overdue');
      if(tElF){ tElF.textContent = ''; tElF.style.left='0px'; tElF.style.display='none'; }
      continue;
    }
    const bar = fill.parentElement;
    const tEl = row._refs.lapBarTime || null;
    const refMs = Number(row.__lapBarRefMs||0);
    // Normalize: ref can arrive as seconds (e.g. 9.842) || ms (9842)
    let refMsN = refMs;
    if(refMsN > 0 && refMsN < 200){ refMsN = Math.round(refMsN * 1000); }

    const start = Number(row.__lapBarStart||0);
    if(!refMsN || !start){
      fill.style.width = '0%';
      if(tEl){ tEl.style.display=''; tEl.textContent = ''; tEl.style.left = '0px'; }
      continue;
    }
    const elapsedRaw = now - start;
    const elapsed = Math.min(elapsedRaw, refMsN);
    let p = elapsed / refMsN;
    const overdue = (elapsedRaw > refMsN);
    // Cronometro (pegado a la punta)
    if(tEl){
      tEl.style.display = '';
      const s = (elapsed/1000);
      tEl.textContent = s.toFixed(3);
      // Centrar el texto con la punta del fill
      try{
        const w = bar ? (bar.clientWidth||0) : 0;
        const x = Math.max(0, Math.min(w, (p*w)));
        tEl.style.left = x.toFixed(1) + 'px';
      }catch(e){}
    }
    // BestLap ghost (purple): updates live if global best improves
    try{
      const gb = row._refs.lapGhostBest || null;
      if(gb){
        const ref = Number(row.__lapBarRefMs||20000);
        const blg = Number(window.__bestLapMs||0);
        if(!blg || blg<=0 || !ref || ref<=0){
          gb.style.opacity = '0';
        } else {
          let br = blg / ref;
          if(br < 0.02) br = 0.02;
          if(br > 1) br = 1;
          const wB = bar ? (bar.clientWidth||0) : 0;
          const xB = Math.max(0, Math.min(wB, br * wB));
          gb.style.left = xB.toFixed(1) + 'px';
          gb.style.opacity = '0.95';
        }
      }
    }catch(e){}

    if(p >= 1){
      fill.style.width = '100%';
      // Verde justo al llegar al tiempo, rojo si se pasa
      if(bar){
        if(overdue) bar.classList.add('overdue');
        else bar.classList.remove('overdue');
      }
      row.__lapBarOverdue = !!overdue;
      fill.style.background = overdue ? '#ff2a2a' : 'hsl(120, 100%, 50%)';
      // Posicionar etiqueta al final
      if(tEl && bar){
        const w = bar.clientWidth || 0;
        const x = Math.max(6, w-6);
        tEl.style.left = x + 'px';
      }
      continue;
    }
    if(bar) bar.classList.remove('overdue');
    row.__lapBarOverdue = false;
    if(p < 0) p = 0;
    const pct = Math.max(0, Math.min(100, p*100));
    fill.style.width = pct.toFixed(1) + '%';
    if(tEl && bar){
      const w = bar.clientWidth || 0;
      let x = (pct/100) * w;
      x = Math.max(18, Math.min(w-18, x));
      tEl.style.left = x.toFixed(1) + 'px';
    }
    // Ghost ratio (marca fantasma): donde termino la vuelta anterior vs la referencia (0..1).
    // Si el progreso actual la rebasa, la barra se va regresando a rojo.
    let g = Number(row.__lapGhostRatio||0);
    if(!g || g<=0) g = 1;
    if(g < 0.05) g = 0.05;
    if(g > 1) g = 1;

    // Color de barra:
    // - Antes de cruzar la marca fantasma: verde estable (nada de rojo al inicio).
    // - Al cruzarla: empieza a "virar" hacia rojo conforme te pasas.
    let hue;
    if(g >= 0.999){
      // Sin marca fantasma util: mantener verde
      hue = 120;
    } else if(p <= g){
      // Antes de la marca: verde
      hue = 120;
    } else {
      // Despues de la marca: de verde -> rojo
      hue = 120 * Math.max(0, 1 - (((p - g) / (1 - g)) * 2.2)); // more aggressive heat-up
    }
    fill.style.background = 'hsl(' + hue.toFixed(0) + ', 100%, 50%)';
  }
}

(function ensureLapBarTimer(){
  if(window.__lapBarTimer) return;
  window.__lapBarTimer = setInterval(updateLapBars, 80);
})();

const STATS_ROTATE_MS = 3200;
window.__statsRotateEpoch = window.__statsRotateEpoch || Date.now();

function getStatsRotateMode(now){
  const t0 = Number(window.__statsRotateEpoch || 0) || 0;
  const elapsed = Math.max(0, Number(now || Date.now()) - t0);
  return (Math.floor(elapsed / STATS_ROTATE_MS) % 2 === 0) ? 'best' : 'mean';
}
function paintStatsRotationRow(row, force){
  if(!row || !row._refs) return;
  const refs = row._refs;
  if(!refs.stats || !refs.rotValue) return;

  const best = refs.blMini ? String(refs.blMini.textContent || '').trim() : '';
  const mean = refs.estMiniBot ? String(refs.estMiniBot.textContent || '').trim() : '';
  const desiredMode = (best && mean) ? getStatsRotateMode() : (best ? 'best' : (mean ? 'mean' : ''));
  const paintKey = desiredMode + '|' + best + '|' + mean;
  if(!force && row.__statsRotPaintKey === paintKey) return;

  const prevMode = row.__statsRotMode || '';
  row.__statsRotPaintKey = paintKey;
  row.__statsRotMode = desiredMode;

  refs.stats.classList.remove('rotBest','rotEst','rotMean','rotSwap');
  refs.rotValue.classList.remove('modeBest','modeEst','modeMean');

  if(refs.rotLabel){
    refs.rotLabel.textContent = '';
    refs.rotLabel.style.visibility = 'hidden';
  }

  if(!best && !mean){
    refs.rotValue.textContent = '';
    refs.rotValue.style.visibility = 'hidden';
    return;
  }

  let value = '';
  let valueClass = '';
  let wrapClass = '';
  if(desiredMode === 'mean' && mean){
    value = mean;
    valueClass = 'modeMean';
    wrapClass = 'rotMean';
  }else if(best){
    value = best;
    valueClass = 'modeBest';
    wrapClass = 'rotBest';
  }else{
    value = mean;
    valueClass = 'modeMean';
    wrapClass = 'rotMean';
  }

  refs.rotValue.style.visibility = 'visible';
  refs.rotValue.textContent = value;
  refs.rotValue.classList.add(valueClass);
  refs.stats.classList.add(wrapClass);
  if(prevMode && prevMode !== desiredMode){
    refs.stats.classList.add('rotSwap');
  }
}
function applyStatsRotation(force){
  const rowEls = window.__rowEls;
  if(!rowEls || !rowEls.forEach) return;
  rowEls.forEach((row) => paintStatsRotationRow(row, !!force));
}
(function ensureStatsRotationTimer(){
  if(window.__statsRotationTimer) return;
  applyStatsRotation(true);
  window.__statsRotationTimer = setInterval(() => {
    try{ applyStatsRotation(false); }catch(e){}
  }, 350);
})();


/*
Smart Scoreboard v3 - Documentacion rapida

Fuente de datos (Firebase Firestore):
- Por default escucha: races/currentRace
- Puedes cambiarlo con URL: ?doc=coleccion/id

Render: 
- Reutiliza nodos por piloto (keyFor) para evitar parpadeos.
- Reordena con FLIP (First-Last-Invert-Play) para animar cambios de posicion sin flashes.

Animaciones: 
- Flecha de posicion (sube/baja) 2500ms con colores.
- lapFlash 2500ms al cruzar vuelta nueva.
- nameFlash 1500ms (nombre).

Colores: 
- LAPS del lider siempre verde.
- lapsMiniTop verde si misma vuelta, amarillo si lapeado.
- BestLap morado y el nombre del best-holder morado.

Notas de limpieza:
- Hay checks null-safe (ej. tagText) para no romper si el elemento no existe.
*/

// globals

  // ===== Theme switcher (21 temas) + Auto Theme =====
(function(){
  const themes = ['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15','t16','t17','t18','t19','t20','t21'];

  // Manual theme (se guarda siempre que el usuario cambie tema)
  const keyManual = 'smartScoreboardThemeV3';
  // Auto theme flag: '1' = ON, '0' = OFF
  const keyAuto = 'smartScoreboardThemeAutoV3';

  let autoEnabled = true;
  try{ autoEnabled = (localStorage.getItem(keyAuto) ?? '1') !== '0'; }catch(e){ autoEnabled = true; }

  function _curTheme(){
    return document.documentElement.getAttribute('data-theme') || 't1';
  }

  function _setBtnLabel(t){
    const btn = document.getElementById('themeBtn');
    if(!btn) return;
    const tag = autoEnabled ? 'AUTO ' : '';
    btn.textContent = (tag + String(t||'t1').toUpperCase()).trim();
    btn.classList.toggle('isAuto', !!autoEnabled);
  }

  function applyTheme(t, persist){
    if(!themes.includes(t)) t = 't1';
    document.documentElement.setAttribute('data-theme', t);
    if(persist){
      try{ localStorage.setItem(keyManual, t); }catch(e){}
    }
    _setBtnLabel(t);
  }

  function nextTheme(){
    const cur = _curTheme();
    const i = themes.indexOf(cur);
    const nxt = themes[(i+1+themes.length)%themes.length];
    applyTheme(nxt, true);
  }

  function setAuto(v){
    autoEnabled = !!v;
    try{ localStorage.setItem(keyAuto, autoEnabled ? '1' : '0'); }catch(e){}
    _setBtnLabel(_curTheme());
  }

  function chooseAutoTheme(pr, raceName){
    // Auto theme por SESION: MANGA/CLASIF vs FINAL A/B/C
    let s = String(raceName||'').toLowerCase();
    s = s.replace(/[\u2013\u2014]/g,'-'); // normaliza guiones raros

    const isFinalA =
      s.includes('final a') ||
      s.includes('a main') || s.includes('a-main') || s.includes('amain') || s.includes('main a');

    const isFinalB =
      s.includes('final b') ||
      s.includes('b main') || s.includes('b-main') || s.includes('bmain') || s.includes('main b');

    const isFinalC =
      s.includes('final c') ||
      s.includes('c main') || s.includes('c-main') || s.includes('cmain') || s.includes('main c');

    const isFinal = isFinalA || isFinalB || isFinalC || s.includes('final');

    const isManga =
      s.includes('manga') ||
      s.includes('clasif') || s.includes('clasific') ||
      s.includes('qual') ||
      /\bq\d\b/.test(s);

    // PRIORIDAD: finales por letra
    if(isFinalA) return 't21';       // Final A -> Carbon Neon Red
    if(isFinalB) return 't18';       // Final B -> Neon Coral (naranja)
    if(isFinalC) return 't15';       // Final C -> Ice Purple (morado)

    if(isFinal)  return 't21';       // Cualquier final -> rojo
    if(isManga)  return 't19';       // Manga/Clasif -> Laser Blue

    // Si es practica y no se detecto sesion, no la pintes de rojo por default
    if(pr === 1 || pr === true) return 't19';

    return 't11';                    // fallback
  }



  function applyAuto(pr, raceName){
    // guarda contexto para "recalc" al reactivar AUTO
    window.__themeAutoLast = { pr: pr, rn: raceName || '' };

    if(!autoEnabled) return;
    const tgt = chooseAutoTheme(pr, raceName);
    const cur = _curTheme();
    if(tgt && tgt !== cur){
      // No pisar el tema manual guardado - solo pinta UI
      applyTheme(tgt, false);
    } else {
      _setBtnLabel(cur);
    }
  }

  // init - aplica tema manual guardado como base
  let saved = 't11';
  try{ saved = localStorage.getItem(keyManual) || 't11'; }catch(e){}
  if(!themes.includes(saved)) saved = 't11';
  applyTheme(saved, false);

  const btn = document.getElementById('themeBtn');
  if(btn){
    // Click = cambia tema manual y apaga AUTO (para evitar pelea)
    btn.addEventListener('click', function(){
      setAuto(false);
      nextTheme();
    });

    // Click derecho = reactiva AUTO (y recalcula con el ultimo contexto)
    btn.addEventListener('contextmenu', function(e){
      e.preventDefault();
      setAuto(true);
      try{
        const ctx = window.__themeAutoLast || {};
        applyAuto(ctx.pr, ctx.rn);
      }catch(err){}
    });
  }

  // expone API minima para el render loop
  window.__themeAuto = {
    isAuto: () => autoEnabled,
    setAuto,
    applyAuto,
    chooseAutoTheme,
    applyTheme
  };
})();

window.prevPosByKey = window.prevPosByKey || new Map();
  const RACEBOARD_VERSION = "Vics_Smart_Raceboard_v3.0.1.88";
  window.RACEBOARD_VERSION = RACEBOARD_VERSION;
  const elRaceName = document.getElementById("raceName");
  const elRN1 = document.getElementById("rn1");
  const elRN2 = document.getElementById("rn2");
  const elRaceClockText = document.getElementById("raceClockText");
  const elRaceMetaInfo = document.getElementById("raceMetaInfo") || null;
  const elModeInitial = document.getElementById("modeInitial");

  const elRN1Txt = document.getElementById("rn1txt") || null;
  const elFlagCountry = document.getElementById("flagCountry") || null;

  function _normKey(s){
    return String(s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "");
  }

  function _fixMojibake(s){
    return String(s ?? "")
      .replaceAll("M\uFFFDxico", "México")
      .replaceAll("MÃ©xico", "México")
      .replaceAll("Espa\uFFFDa", "España")
      .replaceAll("EspaÃ±a", "España")
      .replaceAll("Per\uFFFD", "Perú")
      .replaceAll("PerÃº", "Perú")
      .replaceAll("m\uFFFDs", "más")
      .replaceAll("mÃ¡s", "más")
      .replaceAll("tambi\uFFFDn", "también")
      .replaceAll("tambiÃ©n", "también")
      .replaceAll("aqu\uFFFD", "aquí")
      .replaceAll("aquÃ­", "aquí")
      .replaceAll("\uFFFDltima", "última")
      .replaceAll("Ãºltima", "última");
  }

  const ISO_REGION_CODES = [
    'AD','AE','AF','AG','AL','AM','AO','AR','AT','AU','AZ','BA','BB','BD','BE','BF','BG','BH','BI','BJ',
    'BN','BO','BR','BS','BT','BW','BY','BZ','CA','CD','CF','CG','CH','CI','CL','CM','CN','CO','CR','CU',
    'CV','CY','CZ','DE','DJ','DK','DM','DO','DZ','EC','EE','EG','ER','ES','ET','FI','FJ','FM','FR','GA',
    'GB','GD','GE','GH','GM','GN','GQ','GR','GT','GW','GY','HN','HR','HT','HU','ID','IE','IL','IN','IQ',
    'IR','IS','IT','JM','JO','JP','KE','KG','KH','KI','KM','KN','KP','KR','KW','KZ','LA','LB','LC','LI',
    'LK','LR','LS','LT','LU','LV','LY','MA','MC','MD','ME','MG','MH','MK','ML','MM','MN','MR','MT','MU',
    'MV','MW','MX','MY','MZ','NA','NE','NG','NI','NL','NO','NP','NR','NZ','OM','PA','PE','PG','PH','PK',
    'PL','PS','PT','PW','PY','QA','RO','RS','RU','RW','SA','SB','SC','SD','SE','SG','SI','SK','SL','SM',
    'SN','SO','SR','SS','ST','SV','SY','SZ','TD','TG','TH','TJ','TL','TM','TN','TO','TR','TT','TV','TW',
    'TZ','UA','UG','US','UY','UZ','VA','VC','VE','VN','VU','WS','YE','ZA','ZM','ZW'
  ];

  const COUNTRY_ALIASES = {
    UK:'GB', UAE:'AE', EEUU:'US', EUA:'US', USA:'US', 'U.S.A':'US', US:'US', 'U.S':'US',
    RD:'DO', DR:'DO', PRC:'CN', ROC:'TW', KSA:'SA'
  };

  let COUNTRY_NAME_INDEX = null;

  function _buildCountryNameIndex(){
    if(COUNTRY_NAME_INDEX) return COUNTRY_NAME_INDEX;

    const byName = new Map();
    const push = (name, code) => {
      const n = _normKey(name);
      if(!n || n.length < 3) return;
      if(!byName.has(n)) byName.set(n, code);
    };

    const addDisplayNames = (locale) => {
      try{
        const dn = new Intl.DisplayNames([locale], { type:'region' });
        ISO_REGION_CODES.forEach(code => {
          const label = dn.of(code);
          if(label && label !== code) push(label, code);
        });
      }catch(e){}
    };

    addDisplayNames('es');
    addDisplayNames('en');

    Object.entries(COUNTRY_ALIASES).forEach(([alias, code]) => push(alias, code));

    [
      ['reino unido','GB'],['gran bretana','GB'],['great britain','GB'],['britain','GB'],['england','GB'],
      ['escocia','GB'],['scotland','GB'],['gales','GB'],['wales','GB'],['irlanda del norte','GB'],['northern ireland','GB'],
      ['estados unidos','US'],['united states','US'],['united states of america','US'],['america','US'],
      ['corea del sur','KR'],['south korea','KR'],['corea del norte','KP'],['north korea','KP'],
      ['republica checa','CZ'],['czech republic','CZ'],['chequia','CZ'],['czechia','CZ'],
      ['paises bajos','NL'],['netherlands','NL'],['holanda','NL'],
      ['suiza','CH'],['switzerland','CH'],
      ['costa rica','CR'],['mexico','MX'],['espana','ES'],['spain','ES'],['italia','IT'],['italy','IT'],
      ['peru','PE'],['brasil','BR'],['brazil','BR'],['polonia','PL'],['poland','PL']
    ].forEach(([alias, code]) => push(alias, code));

    const entries = Array.from(byName.entries())
      .map(([name, code]) => ({ name, code, len: name.length }))
      .sort((a,b) => b.len - a.len);

    COUNTRY_NAME_INDEX = { byName, entries };
    return COUNTRY_NAME_INDEX;
  }

  function _countryFromTitle(line1){
    const raw = String(line1 || '').trim();
    if(!raw) return '';

    const t = _normKey(raw);
    if(!t) return '';

    const tok = ' ' + t.replace(/[^a-z0-9]+/g,' ') + ' ';
    const { byName, entries } = _buildCountryNameIndex();

    const compactUpper = String(raw || '').toUpperCase().replace(/[^A-Z.]/g,'');
    if(COUNTRY_ALIASES[compactUpper]) return COUNTRY_ALIASES[compactUpper];

    for(const item of entries){
      if(t.includes(item.name)) return item.code;
    }

    for(const code of ISO_REGION_CODES){
      const low = code.toLowerCase();
      if(tok.includes(' ' + low + ' ')) return code;
    }

    for(const [alias, code] of Object.entries(COUNTRY_ALIASES)){
      const n = _normKey(alias);
      if(!n) continue;
      if(tok.includes(' ' + n.replace(/[^a-z0-9]+/g,' ') + ' ')) return code;
    }

    return byName.get(t) || '';
  }

  function _flagEmoji(code){
    const cc = String(code || '').toUpperCase();
    if(!/^[A-Z]{2}$/.test(cc)) return '';
    const A = 0x1F1E6;
    return String.fromCodePoint(A + (cc.charCodeAt(0) - 65), A + (cc.charCodeAt(1) - 65));
  }

  function _flagAssetUrl(code){
    const cc = String(code || '').toLowerCase();
    if(!/^[a-z]{2}$/.test(cc)) return '';
    return 'https://flagcdn.com/w40/' + cc + '.png';
  }

  function updateCountryFlag(){
    if(!elFlagCountry) return;

    const rawCandidates = Array.from(arguments)
      .map(v => String(v || '').trim())
      .filter(Boolean);

    const extra = [];
    try{ if(elRN1Txt && elRN1Txt.textContent) extra.push(String(elRN1Txt.textContent).trim()); }catch(e){}
    try{ if(elRN2 && elRN2.textContent) extra.push(String(elRN2.textContent).trim()); }catch(e){}
    try{ if(elRaceName && elRaceName.textContent) extra.push(String(elRaceName.textContent).trim()); }catch(e){}

    const candidates = rawCandidates.concat(extra).filter(Boolean);

    let code = '';
    for(const candidate of candidates){
      code = _countryFromTitle(candidate);
      if(code) break;
    }

    const emoji = _flagEmoji(code);
    const asset = _flagAssetUrl(code);
    if(code && asset){
      const safeCode = String(code || '').toUpperCase();
      elFlagCountry.innerHTML = '<img src="' + asset + '" alt="' + safeCode + '" loading="eager" decoding="async" referrerpolicy="no-referrer">';
      elFlagCountry.style.display = 'inline-flex';
      elFlagCountry.setAttribute('aria-label', safeCode);
      elFlagCountry.title = safeCode + (emoji ? ' ' + emoji : '');
    }else if(emoji){
      elFlagCountry.textContent = emoji;
      elFlagCountry.style.display = 'inline-flex';
      elFlagCountry.setAttribute('aria-label', code);
      elFlagCountry.title = code;
    }else{

function fmtMs(ms){

function parseLapTimeToMs(v){
  if(v===undefined || v===null) return 0;
  if(typeof v === 'number' && isFinite(v)) {
    // heuristic: if looks like seconds (e.g. 4.539), convert to ms
    return v < 1000 ? Math.round(v*1000) : Math.round(v);
  }
  const s0 = String(v).trim();
  if(!s0) return 0;
  // handle Firestore field with words (DNF/DNS)
  if(/^[A-Za-z]+$/.test(s0)) return 0;
  const s = s0.replace(',', '.');
  if(s.includes(':')){
    const parts = s.split(':');
    const nums = parts.map(p => p.trim());
    if(nums.length===2){
      const m = parseInt(nums[0],10);
      const secPart = nums[1];
      const secSplit = secPart.split('.');
      const sec = parseInt(secSplit[0]||'0',10);
      const ms = parseInt((secSplit[1]||'0').padEnd(3,'0').slice(0,3),10);
      if(!isFinite(m) || !isFinite(sec) || !isFinite(ms)) return 0;
      return (m*60 + sec)*1000 + ms;
    }
    if(nums.length===3){
      const h = parseInt(nums[0],10);
      const m = parseInt(nums[1],10);
      const secPart = nums[2];
      const secSplit = secPart.split('.');
      const sec = parseInt(secSplit[0]||'0',10);
      const ms = parseInt((secSplit[1]||'0').padEnd(3,'0').slice(0,3),10);
      if(!isFinite(h) || !isFinite(m) || !isFinite(sec) || !isFinite(ms)) return 0;
      return ((h*3600 + m*60 + sec)*1000 + ms);
    }
  }
  // plain seconds with decimals
  const f = parseFloat(s);
  if(!isFinite(f)) return 0;
  return f < 1000 ? Math.round(f*1000) : Math.round(f);
}

  function deriveDefaultDurationMs(data){

      // Final A detection
      if(rn.includes("final a") || rn.includes("a main") || rn.includes("main a")){

      }else if(rn.includes("final") || rn.includes("b main") || rn.includes("c main")){

                   : null;
      if(typeof direct === "number" && isFinite(direct) && direct > 0) return direct;

      const fromOfficial = durationToMs(base.raceDuration, base.raceDurationType);
      if(fromOfficial > 0) return fromOfficial;
      const fromTopOfficial = durationToMs(data && data.raceDuration, data && data.raceDurationType);
      if(fromTopOfficial > 0) return fromTopOfficial;

      const cls = (base && Array.isArray(base.classification)) ? base.classification
               : (data && Array.isArray(data.classification)) ? data.classification
               : null;
      if(cls && cls.length){
        let best = 0;
        for(const r of cls){
          const v = Number(r && (r.estTimeMs!=null ? r.estTimeMs : r.estTime));
          if(isFinite(v) && v > best) best = v;

        if(best >= 60000 && best <= 1200000) return best;

      }
      // m:ss(.mmm)
      m = s.match(/^(\d+):(\d{1,2})(?:\.(\d{1,3}))?$/);
      if(m){
        var mm2 = parseInt(m[1],10)||0;
        var ss2 = parseInt(m[2],10)||0;
        var ms2 = m[3] ? parseInt((m[3]+'000').slice(0,3),10) : 0;
        return ((mm2*60 + ss2)*1000 + ms2);
      }
      // numeric string
      var n = Number(s.replace(',','.'));
      if(!isNaN(n)) return parseRaceTimeToMs(n);
    }
    return 0;
  }

  function fmtRaceTime(ms){
    ms = Number(ms||0);
    if(!(ms>0)) return "";
    var totalSec = Math.floor(ms/1000);
    var sec = totalSec % 60;
    var min = Math.floor(totalSec/60);
    if(min < 60){
      return String(min) + ":" + String(sec).padStart(2,'0');
    }
    var h = Math.floor(min/60);
    var m = min % 60;
    return String(h) + ":" + String(m).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
  }

function _parseGapSeconds(val){
  if(val==null) return null;
  let s = String(val).trim();
  if(!s) return null;
  // Laps down like +1V / +1 V => no interval in seconds
  if(/^[+-]?\d+\s*V$/i.test(s)) return null;
  // Extract first number (supports + and decimals)
  const m = s.match(/[+-]?\d+(?:\.\d+)?/);
  if(!m) return null;
  const x = parseFloat(m[0]);
  return Number.isFinite(x) ? x : null;
}
function _fmtInterval(sec){
  if(sec==null || !Number.isFinite(sec)) return "";
  const sign = sec>=0 ? "+" : "-";
  const v = Math.abs(sec);
  return sign + v.toFixed(3);
}

  const suppressFlip = !!window.__suppressFlipOnce;
  if(suppressFlip) window.__suppressFlipOnce = false;

  
  // Detect feed reset (laps back to 0). Debounced to avoid wiping UI on transient snapshots.
  let maxLapsNow = 0;
  try{
    rows.forEach(rr=>{
      const n = parseInt(String(rr.laps ?? rr.lapcount ?? rr.lapCount ?? "0"),10);
      if(isFinite(n) && n>maxLapsNow) maxLapsNow = n;
    });
  }catch(e){}
  const prevMax = Number(window.__prevMaxLaps||0);
  window.__prevMaxLaps = maxLapsNow;

  // "Stale state" means: UI thinks we had a real race (finished flags, best lap, prev maps),
  // but feed is now all zeros. In that case, force reset even if prevMax was already 0.
  let hasStale = false;
  try{
    hasStale = (!window.__freshRace) ||
      (Number(window.__bestLapMs||0) > 0) ||
      (window.prevLapCountByKey && window.prevLapCountByKey.size>0) ||
      (window.prevPosByKey && window.prevPosByKey.size>0) ||
      (window.__rowEls && Array.from(window.__rowEls.values()).some(r=>r && r.__finished));
  }catch(e){}

  if(maxLapsNow === 0 && (prevMax > 0 || hasStale)){
    const nowZ = Date.now();
    window.__zeroFeedFirstTs = window.__zeroFeedFirstTs || nowZ;
    window.__zeroFeedStreak = (window.__zeroFeedStreak||0) + 1;

    // Only hard-reset if zeros persist (3 consecutive snaps) OR for >1500ms
    if(window.__zeroFeedStreak >= 3 || (nowZ - window.__zeroFeedFirstTs) > 1500){
      resetRaceState("feed_zero");
    }
  } else {
    window.__zeroFeedStreak = 0;
    window.__zeroFeedFirstTs = 0;
  }
// Best lap highlight (min bestMs > 0)
  let bestLapMs = null;
  rows.forEach(rr => {
    const raw = (rr.bestMs ?? rr.bestLapMs ?? rr.best ?? rr.bestTime ?? rr.bestLapTime ?? rr.bestLapTimeMs ?? 0);
    const v = parseLapTimeToMs(raw) || 0;
    if (v > 0 && (bestLapMs === null || v < bestLapMs)) bestLapMs = v;
  });

  // expose global best lap for purple ghost marker
  if(bestLapMs && Number(bestLapMs)>0){ window.__bestLapMs = Number(bestLapMs); }
const rowEls = window.__rowEls || (window.__rowEls = new Map());

  // FIRST rects (before reorder) - FLIP
  const first = new Map();
  if(!suppressFlip){
    Array.from(elRows.children).forEach(node => {
      if(node && node.dataset && node.dataset.key){
        first.set(node.dataset.key, node.getBoundingClientRect());
      }
    });
  }

  const leaderLaps = Number((rows[0] && rows[0].laps) || 0);
  const nextKeys = new Set();
  const frag = document.createDocumentFragment();

  let prevR = null;
  rows.forEach(r => {
    const k = keyFor(r);
    nextKeys.add(k);

    let row = rowEls.get(k);
    const isNew = !row;
    if(!row){
      row = buildRow();
      row.dataset.key = k;
      if(!suppressFlip){
        row.classList.add("enter");
        setTimeout(()=>row.classList.remove("enter"), 650);
      }
      rowEls.set(k, row);
    }

    let intervalStr = "-";
if(r && r.pos>1){
  // INT siempre visible:
  // 1) Si hay gap en segundos -> INT = gapActual - gapAnterior
  const a = _parseGapSeconds(r.gap || r.diff);
  const b = prevR ? _parseGapSeconds(prevR.gap || prevR.diff) : null;
  if(a!=null && b!=null){
    intervalStr = _fmtInterval(a-b);
  }else{
    // 2) Fallback: si backend manda vueltas (+1 L / +2 L / +1 V), mostrarlo tal cual.
    const rawDiff = (r.diff!=null ? String(r.diff).trim() : "");
    const rawGap  = (r.gap!=null  ? String(r.gap).trim()  : "");
    intervalStr = (rawDiff || rawGap || "-");
  }
}
    updateRow(row, r, bestLapMs, leaderLaps, intervalStr);
    prevR = r;
    frag.appendChild(row);
  });

  // Remove stale rows
  for(const [k, node] of Array.from(rowEls.entries())){
    if(!nextKeys.has(k)){
      try{ node.remove(); }catch(e){}
      rowEls.delete(k);
      try{ window.prevPosByKey && window.prevPosByKey.delete(k); }catch(e){}
      try{ window.posCueByKey && window.posCueByKey.delete(k); }catch(e){}
      try{ window.prevLapCountByKey && window.prevLapCountByKey.delete(k); }catch(e){}
      try{ window.prevLastLapMsByKey && window.prevLastLapMsByKey.delete(k); }catch(e){}
      try{ window.prevLastLapRawByKey && window.prevLastLapRawByKey.delete(k); }catch(e){}
    }
  }

  // Reorder DOM (keeps same nodes, enables FLIP)
  elRows.appendChild(frag);

  // LAST rects + FLIP animate movement
  if(!suppressFlip) rows.forEach(r => {
    const k = keyFor(r);
    const node = rowEls.get(k);
    const firstRect = first.get(k);
    if(!node || !firstRect) return;

    const lastRect = node.getBoundingClientRect();
    const dy = firstRect.top - lastRect.top;
    if(Math.abs(dy) < 1) return;

    node.style.transition = "none";
    node.style.transform = "translateY(" + dy + "px)";
    node.getBoundingClientRect(); // force reflow

    requestAnimationFrame(() => {
      node.style.transition = "transform 3500ms cubic-bezier(.2,.9,.2,1)";
      node.style.transform = "translateY(0)";
      clearTimeout(node.__flipT);
      node.__flipT = setTimeout(() => {
        node.style.transition = "";
        node.style.transform = "";
      }, 3800);
    });
  });
}

  // ===== Race duration + per-pilot finish logic =====
function getTargetRaceMs(raceName){
  const rn = String(raceName||'').toLowerCase();
  // Final A / A-Main / Main A => 6 min
  if(/\b(final\s*a|a\s*-?main|main\s*a|amain)\b/i.test(raceName||'')) return 6*60*1000;
  // Any other final => 4 min
  if(/\bfinal\b/i.test(rn)) return 4*60*1000;
  // Mangas / qualy => 3 min
  return 3*60*1000;
}

function applyFinishState(row){
  if(!row || row.__finished) return;
  row.__finished = true;
  row.classList.add('finished');
  // Freeze lap bar chrono at 0.000 on the last pass
  try{
    if(row._refs && row._refs.lapBarFill){
      row.__lapBarStart = 0;
      row.__lapBarRefMs = 0;
      row.__lapBarOverdue = false;
      row.__lapGhostRatio = 0;
      if(row._refs && row._refs.lapGhost) row._refs.lapGhost.classList.remove('show');
      const fill = row._refs.lapBarFill;
      fill.style.width = '0%';
      fill.style.background = '';
      const bar = fill.parentElement; if(bar) bar.classList.remove('overdue');
      const tEl = row._refs.lapBarTime;
      if(tEl){
        tEl.textContent = '';
        tEl.style.left = '0px';
        tEl.style.display = 'none';
      }
    }
  }catch(e){}
}

// ===== Data normalization from Firestore doc =====
  function pickParsed(data) {
    if (!data) return null;
    if (data.parsed && Array.isArray(data.parsed.classification)) return data.parsed;
    if (data.rawJson) {
      try {
        const parsed = (typeof data.rawJson === "string") ? JSON.parse(data.rawJson) : data.rawJson;
        if (parsed && Array.isArray(parsed.classification)) return parsed;
      } catch (e) {}
    }
    return null;
  }

  function parseDocPath() {
    // default: races/currentRace
    const p = new URLSearchParams(location.search);
    const path = (p.get("doc") || "races/currentRace").trim();
    const parts = path.split("/").filter(Boolean);
    if (parts.length !== 2) return { col: "races", id: "currentRace" };
    return { col: parts[0], id: parts[1] };
  }

  // ===== Race state reset (new race) =====
  // Objetivo: cuando entra data de una carrera nueva, NO queremos arrastrar nada de la anterior:
  // - se quita bandera de cuadros (posDelta), se quita rojo (finished), se borran cues/FLIP/lapFlash
  // - se reinician comparadores (prevLap/prevLastLap/prevPos) para que no haya flashes falsos
  // - se fuerza __freshRace para poner minis en 0 hasta que empiecen a fluir laps reales
  function resetRaceState(reason){
    window.__freshRace = true;
    window.__suppressFlipOnce = true;
    window.__raceTimeMs = 0;
    window.__raceTimeDisp = "";
    window.__targetRaceMs = 0;
    window.__prevMaxLaps = 0;
    // Hard reset: también cuando resetea por heuristic/raceName
    window.__bestLapMs = 0;
    window.__zeroFeedStreak = 0;
    window.__zeroFeedFirstTs = 0;
    window.__prevLeaderLaps = null;
    window.__prevRaceTimeMs = null;
    window.__statsRotateEpoch = Date.now();
    try{ applyStatsRotation(true); }catch(e){}

    try{ window.prevLastLapMsByKey && window.prevLastLapMsByKey.clear(); }catch(e){}
    try{ window.prevLastLapTrendByKey && window.prevLastLapTrendByKey.clear(); }catch(e){}
    try{ window.prevLastLapRawByKey && window.prevLastLapRawByKey.clear(); }catch(e){}
    try{ window.prevLapCountByKey && window.prevLapCountByKey.clear(); }catch(e){}
    try{ window.posCueByKey && window.posCueByKey.clear(); }catch(e){}
    try{ window.prevPosByKey && window.prevPosByKey.clear(); }catch(e){}

    // Reset visual state on existing nodes (avoid full DOM wipe to reduce flashes)
    try{
      const rowEls = window.__rowEls;
      if(rowEls && rowEls.forEach){
        rowEls.forEach((row,k)=>{
          if(!row) return;
          row.__finished = false;
          row.__lapFlashUntil = 0;
          row.__lapBarStart = 0;
          row.__lapBarRefMs = 0;
          row.__lapBarOverdue = false;
          row.__lapGhostRatio = 0;
          row.classList.remove('finished','lapFlash','moveUp','moveDown','bestLap','enter');
          if(row._refs){
            try{
              const pd = row._refs.posDelta;
              if(pd){ pd.textContent=''; pd.innerHTML=''; pd.className='posDelta'; pd.style.opacity='0'; }
              const fill = row._refs.lapBarFill;
              if(fill){ fill.style.width='0%'; fill.style.background=''; const b=fill.parentElement; if(b) b.classList.remove('overdue'); }
              const tEl = row._refs.lapBarTime;
              if(tEl){ tEl.textContent=''; tEl.style.left='0px'; tEl.style.display='none'; }
              const gh = row._refs.lapGhost;
              if(gh){ gh.classList.remove('show'); gh.style.left='0px'; }
              const nm = row._refs.nmWrap;
              if(nm){ nm.classList.remove('nameFlash'); }
            
              const posNum = row._refs.posNum; if(posNum){ posNum.textContent=''; }
              const nm1 = row._refs.nm1First; if(nm1){ nm1.textContent=''; }
              const nm2 = row._refs.nm2Last; if(nm2){ nm2.textContent=''; }
              const rt = row._refs.rightTop; if(rt){ rt.textContent=''; }
              const ri = row._refs.rightInt; if(ri){ ri.textContent=''; }
              const lapsTop = row._refs.lapsMiniTop; if(lapsTop){ lapsTop.textContent=''; }
              const llTop = row._refs.llMiniTop; if(llTop){ llTop.textContent=''; llTop.innerHTML=''; }
              const estB = row._refs.estMiniBot; if(estB){ estB.textContent=''; }
              const blB = row._refs.blMini; if(blB){ blB.textContent=''; }
              const rotL = row._refs.rotLabel; if(rotL){ rotL.textContent=''; rotL.style.visibility='hidden'; }
              const rotV = row._refs.rotValue; if(rotV){ rotV.textContent=''; rotV.style.visibility='hidden'; rotV.classList.remove('modeBest','modeEst','modeMean'); }
              if(row._refs.stats){ row._refs.stats.classList.remove('rotBest','rotEst','rotMean','rotSwap'); }
              row.__statsRotMode = '';
              row.__statsRotPaintKey = '';
              const sep1 = row._refs.sepDash; if(sep1){ sep1.style.visibility='hidden'; }
              const sep2 = row._refs.sepDash2; if(sep2){ sep2.style.visibility='hidden'; }
}catch(e){}
          }
        })
      }
    }catch(e){}

    // Guardrails for heuristics
    window.__prevLeaderLaps = null;
    window.__prevRaceTimeMs = null;
    window.__statsRotateEpoch = Date.now();
    try{ applyStatsRotation(true); }catch(e){}
    window.__resetReason = String(reason||'');
  }


function startListener(){
    if(!db) return;
    ensureScanlines();
    const { col, id } = parseDocPath();
    const raceRef = db.collection(col).doc(id);
    if(unsub){ try{unsub();}catch(e){} unsub=null; }

    // Title static
    if(elTitle) elTitle.textContent = "CLASIFICACION";

    unsub = raceRef.onSnapshot((snap) => {
      const _exists = (typeof snap.exists === "function" ? snap.exists() : snap.exists);
      if (!_exists) { lastFeedTs = 0; setLive(false); return; }
      lastFeedTs = Date.now();
      setLive(true);
      const data = snap.data();

      // RaceName (2 lines)
      try{
        const rn = (pickRaceName(data) || "-");
        const parts = rn.split(/\s*[-–]\s*/);
        const line1 = (parts[0] || rn).trim();
        const line2 = (parts.slice(1).join(' - ') || '').trim();
        if(elRN1Txt) elRN1Txt.textContent = line1;
        else if(elRN1) elRN1.textContent = line1;
        if(elRN2) elRN2.textContent = line2;
        try{ updateCountryFlag(rn, line2, line1); }catch(e){}
        if(elRaceName && !elRN1) elRaceName.textContent = rn;
      }catch(e){}

      const race = pickParsed(data);
      if (!race || !Array.isArray(race.classification)) return;

      // Reloj + modo (PRACTICA/CARRERA)
      try{
        const clkRaw = pickClockValue(data, race);
        const durationMs = pickRaceDurationMs(data, race);
        const elapsedMs = pickSessionElapsedMs(data, race, durationMs);
        if(clkRaw==null && !(elapsedMs > 0)){
          if(elRaceClockText) elRaceClockText.textContent = "--:--";
          stopClockTicker();
        }else{
          setClockBase(elapsedMs, durationMs);
          if(elRaceClockText) elRaceClockText.textContent = fmtClockCompact((durationMs>0)?Math.max(0, durationMs - elapsedMs):elapsedMs);
        }

        const pr = pickPracticeFlag(data, race);
        const st = pickSessionType(data, race);
        const modeInitial = (pr===1) ? "P" : (st === "quali" ? "Q" : (st === "final" ? "F" : (pr===0 ? "C" : "")));
        if(elModeInitial){
          elModeInitial.textContent = modeInitial || "";
          elModeInitial.style.display = modeInitial ? "inline-flex" : "none";
          elModeInitial.classList.toggle("isPractice", modeInitial === "P");
          elModeInitial.classList.toggle("isRace", modeInitial === "C" || modeInitial === "Q" || modeInitial === "F");
        }
// Auto Theme: practica vs manga vs final (si esta activo)
        try{
          const rnAuto = pickRaceName(data) || (race && race.raceName) || "";
          window.__themeAuto && window.__themeAuto.applyAuto && window.__themeAuto.applyAuto(pr, rnAuto);
        }catch(e){}
      }catch(e){}

      // Race total time (field: time) shown below stBot
      try{
        const tRaw = pickRaceTime(data, race);
        const tMs = parseRaceTimeToMs(tRaw);
        window.__raceTimeMs = tMs;
        window.__raceTimeDisp = fmtRaceTime(tMs);
      }catch(e){ window.__raceTimeMs = 0; window.__raceTimeDisp = ""; }


      // Tag text based on raceName
      const rn = _fixMojibake(String(race.raceName ?? data.raceName ?? ""));
      try{ window.__targetRaceMs = pickRaceDurationMs(data, race); }catch(e){ window.__targetRaceMs = 0; }
      const isFinal = /\bfinal\b/i.test(rn) || pickSessionType(data, race) === "final";
      if(elTag) elTag.textContent = isFinal ? "FINAL LAP" : "LIVE";

      const cls = race.classification;
      const rows = cls
        .map(x => {
          const pos = Number(x.pos ?? 0);
          const bestLapIndex = (x.bestLapIndex ?? x.bestLap ?? "");
          return {
            pos,
            no: (x.driverNumber ?? x.racerNumber ?? x.racerNo ?? ""),
            name: _fixMojibake(String(x.driverName ?? x.racerName ?? x.name ?? "")),
            laps: (x.lapcount ?? x.laps ?? x.lapCount ?? ""),
            time: (x.time ?? x.totalTime ?? x.total_time ?? x.totalMs ?? x.total_ms ?? ""),
            lastLapRaw: (x.lastTime ?? x['last laptime'] ?? x.lastLapTime ?? x.last_laptime ?? x.last_lap_time ?? x.lastLap ?? x.lastlap ?? x.lastLapMs ?? x.last_lap_ms ?? x.lastMs ?? x.last ?? ''),
            lastLapMs: Number(x.lastLapMs ?? x.last_lap_ms ?? x.lastMs ?? x.lastTime ?? 0),
            estLap: (x.estLap ?? ""),
            estLaps: (x.estLaps ?? x.estlaps ?? x.est_laps ?? x.estLapS ?? x.estLapCount ?? x.estLap ?? ""),
            gap: (x.gapText ?? x.gap ?? ""),
            diff: (x.diffText ?? x.diff ?? ""),
            best: (x.bestTime ?? x.bestLapTime ?? x.best ?? ""),
            bestMs: Number(x.bestMs ?? x.bestLapMs ?? x.best ?? 0),
            bestLapMs: Number(x.bestLapMs ?? x.bestMs ?? x.best ?? 0),
            bestLapIndex: bestLapIndex,
            mean: (x.mean ?? ""),
            meanMs: Number(x.meanMs ?? x.mean ?? 0),
            meanTime: (x.meanTime ?? ""),
            meanTimeFmt: (x.meanTimeFmt ?? ""),
            pace: (x.pace ?? ""),
            paceMs: Number(x.paceMs ?? 0),
            paceTime: (x.paceTime ?? ""),
            paceTimeFmt: (x.paceTimeFmt ?? ""),
            driverNumber: (x.driverNumber ?? x.racerNumber ?? ""),
            driverName: _fixMojibake(String(x.driverName ?? x.racerName ?? x.name ?? "")),
            sourceRowKeys: Array.isArray(x.sourceRowKeys) ? x.sourceRowKeys : [],
            extraRowKeys: Array.isArray(x.extraRowKeys) ? x.extraRowKeys : [],
            extraRowPreview: Array.isArray(x.extraRowPreview) ? x.extraRowPreview : [],
            extraRowCount: Number(x.extraRowCount ?? ((Array.isArray(x.extraRowKeys) ? x.extraRowKeys.length : 0))) || 0
          };
        })
        .filter(r => r.pos > 0)
        .sort((a,b) => a.pos - b.pos);

      updateRaceMetaInfo(data, race, rows);

      // Heuristica: carrera nueva aunque el raceName sea igual (ej. misma etiqueta, nueva manga/final).
      // Disparadores: leader laps se reinicia + el reloj baja fuerte.
      try{
        const rkNow = String(race.raceName ?? data.raceName ?? "").trim();
        if(rkNow){
          if(window.__raceKey && window.__raceKey !== rkNow){
            resetRaceState('raceName');
          }
          window.__raceKey = rkNow;
        }

        const leaderNow = Number((rows[0] && rows[0].laps) || 0) || 0;
        const tNow = Number(window.__raceTimeMs||0) || 0;
        const pl = window.__prevLeaderLaps;
        const pt = window.__prevRaceTimeMs;
        const lapsReset = (pl!=null && ((leaderNow===0 && pl>=1) || (leaderNow < (pl-2))));
        const timeReset = (pt!=null && ((tNow>0 && pt>0 && (tNow < (pt-5000))) || (tNow===0 && pt>15000)));
        if(lapsReset && timeReset){
          resetRaceState('heuristic');
        }
        window.__prevLeaderLaps = leaderNow;
        window.__prevRaceTimeMs = tNow;
      }catch(e){}

      // If last-lap data starts flowing, stop forcing 0
      try{
        if(window.__freshRace){
          const anyLL = rows.some(rr => (Number(rr.laps||0)>0) && ((Number(rr.lastLapMs||0)>0) || (parseLapTimeToMs(rr.lastLapRaw)>0)));
          if(anyLL) window.__freshRace = false;
        }
      }catch(e){}

      render(rows);
    }, (err) => {
      console.error("Firestore onSnapshot error:", err);
      lastFeedTs = 0;
      setLive(false);
    });
  }


// Boot
window.addEventListener('load', () => {
  try{
    const vEl = document.getElementById('verText');
    if(vEl) vEl.textContent = RACEBOARD_VERSION;
    document.title = RACEBOARD_VERSION;
  }catch(e){}
  if(initFirebase()){
    startListener();
  }
});

</script>
